services:
  postgres:
    image: postgres:16-bookworm
    container_name: example_db
    environment:
      POSTGRES_DB: vaadinstart
      POSTGRES_USER: vaadinstart
      POSTGRES_PASSWORD: vaadinstart
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: